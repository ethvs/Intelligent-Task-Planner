name: intelligent-task-planner
version: 6.0.0-final
description: |
  智能任务规划器 - 高度自主的AI任务自动化引擎
  Auto-Skill Orchestrator with 152 task types
author: ethvs
license: MIT
repository: https://github.com/ethvs/Intelligent-Task-Planner

# 技能分类
category: automation
tags:
  - task-planner
  - intent-recognition
  - skill-orchestrator
  - automation
  - ai-assistant

# 入口配置
entry:
  file: index.js
  function: analyze

# 导出接口
exports:
  - analyze
  - recognize
  - getSupportedTasks
  - getTaskDetails
  - validateConfig
  - batchAnalyze

# 技能依赖
dependencies:
  - node: ">=14.0"

# 可选技能集成
optionalSkills:
  - openclaw/storyteller
  - openclaw/analyzer
  - openclaw/coder
  - clawrouter/writer
  - clawrouter/coder

# 配置参数
config:
  autoInstall:
    type: boolean
    default: true
    description: 自动安装缺失技能
  sources:
    type: array
    default: ["clawhub", "github", "openclaw"]
    description: 技能查找来源
  qualityThreshold:
    type: number
    default: 0.85
    description: 质量门控阈值
  maxSteps:
    type: number
    default: 20
    description: 最大执行步骤
  timeoutMinutes:
    type: number
    default: 30
    description: 任务超时时间

# 触发条件
triggers:
  - type: intent
    patterns:
      - ".*"
    description: 所有自然语言输入

# 性能指标
metrics:
  taskTypes: 152
  keywords: 1325
  avgConfidence: 99.1
  responseTime: "0.27ms"

# 支持的语言
languages:
  - zh-CN
  - en-US

# 文档
documentation:
  readme: README.md
  skill: SKILL.md
  api: docs/API.md
  changelog: docs/CHANGELOG.md

# 测试
test:
  command: "node test/comprehensive-test.js"
